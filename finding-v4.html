<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M6 14 Q16 26 26 14' fill='none' stroke='%230051CC' stroke-width='3' stroke-linecap='round'/></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FFFFFF;
      --bg-secondary: #F5F5F7;
      --bg-tertiary:  #EBEBED;
      --border:       #D2D2D7;
      --border-light: #E8E8ED;
      --text:         #1D1D1F;
      --text-2:       #6E6E73;
      --text-3:       #AEAEB2;
      --accent:       #0071E3;
      --accent-light: rgba(0,113,227,0.08);
      --accent-mid:   rgba(0,113,227,0.18);
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    /* Nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border-light);
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px); z-index: 20;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
    .nav-tag { font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }

    /* Layout */
    .main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }

    /* Panel */
    .panel { border-right: 1px solid var(--border-light); background: var(--bg-secondary); display: flex; flex-direction: column; overflow: hidden; }
    .panel-inner { padding: 22px 18px; flex: 1; overflow-y: auto; scrollbar-width: none; }
    .panel-inner::-webkit-scrollbar { display: none; }

    .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 20px; }
    .search-input {
      width: 100%; padding: 10px 14px 10px 36px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .s-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); }

    /* Vibe list */
    .vibe-section { margin-bottom: 20px; }
    .vibe-list { display: flex; flex-direction: column; gap: 2px; }
    .vibe-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 11px; border-radius: 9px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .vibe-item:hover { background: var(--bg); border-color: var(--border-light); }
    .vibe-item.active { background: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .vibe-left { display: flex; align-items: center; gap: 9px; }
    .vibe-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.15s; flex-shrink: 0; }
    .vibe-item.active .vibe-dot { background: var(--accent); }
    .vibe-label { font-size: 13px; font-weight: 500; color: var(--text-2); transition: color 0.15s; }
    .vibe-item:hover .vibe-label { color: var(--text); }
    .vibe-item.active .vibe-label { color: var(--text); font-weight: 600; }
    .vibe-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .vibe-item.active .vibe-check { background: var(--accent); border-color: var(--accent); }
    .vibe-check-inner { width: 5px; height: 5px; border-radius: 50%; background: white; opacity: 0; transition: opacity 0.15s; }
    .vibe-item.active .vibe-check-inner { opacity: 1; }

    .rule { height: 1px; background: var(--border-light); margin: 16px 0; }

    /* Lang */
    .lang-row { display: flex; gap: 6px; margin-bottom: 20px; }
    .lang-btn {
      flex: 1; padding: 7px 0; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-2);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .lang-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

    /* Find btn */
    .find-btn {
      width: 100%; padding: 11px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    }
    .find-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .find-btn:active { transform: translateY(0); }
    .find-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* Content */
    .content { display: grid; grid-template-columns: 1fr 1.6fr; overflow: hidden; }

    /* Results */
    .results-col { border-right: 1px solid var(--border-light); display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .results-header { padding: 14px 18px 12px; border-bottom: 1px solid var(--border-light); display: flex; align-items: baseline; justify-content: space-between; flex-shrink: 0; }
    .r-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
    .r-count { font-size: 11px; color: var(--text-3); }
    .results-list { flex: 1; overflow-y: visible; padding: 12px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* Card — accordion style */
    .place-card {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 12px; overflow: hidden;
      opacity: 0; transform: translateY(8px);
      animation: cardIn 0.3s ease forwards;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .place-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    /* Card header — always visible, clickable */
    .card-header {
      padding: 13px 15px; cursor: pointer;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      transition: background 0.15s;
    }
    .card-header:hover { background: var(--bg-secondary); }
    .card-header-left { flex: 1; min-width: 0; }
    .card-num { font-size: 10px; font-weight: 600; color: var(--text-3); margin-bottom: 2px; letter-spacing: 0.06em; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .card-rating { display: flex; align-items: center; gap: 3px; }
    .star { color: var(--accent); font-size: 10px; }
    .r-num { font-size: 12px; font-weight: 600; }
    .r-ct { font-size: 10px; color: var(--text-3); }
    .card-chevron {
      color: var(--text-3); transition: transform 0.25s ease;
      display: flex; align-items: center;
    }
    .place-card.open .card-chevron { transform: rotate(180deg); }

    /* Card body — collapsible */
    .card-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      border-top: 0px solid var(--border-light);
    }
    .place-card.open .card-body {
      max-height: 2000px;
      border-top-width: 1px;
    }
    .card-body-inner { padding: 14px 15px; }

    .card-why { font-size: 11px; color: var(--text-2); line-height: 1.6; margin-bottom: 10px; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .c-tag {
      font-size: 10px; font-weight: 500; padding: 2px 8px;
      border-radius: 100px; background: var(--bg-secondary);
      color: var(--text-2); border: 1px solid var(--border-light);
    }
    .place-card.active .c-tag { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }

    .detail-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; }
    .detail-icon { color: var(--text-3); flex-shrink: 0; margin-top: 1px; }
    .detail-text { font-size: 11px; color: var(--text-2); line-height: 1.5; }

    .evidence-block { margin-top: 10px; padding: 10px 12px; background: var(--bg-secondary); border-radius: 8px; border-left: 2px solid var(--accent); }
    .evidence-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }
    .evidence-item { font-size: 11px; color: var(--text-2); line-height: 1.55; padding: 3px 0; border-bottom: 1px solid var(--border-light); }
    .evidence-item:last-child { border-bottom: none; }

    .card-btns { display: flex; gap: 6px; margin-top: 12px; }
    .c-btn {
      font-size: 10px; font-weight: 600; padding: 5px 12px;
      border-radius: 7px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-2);
      cursor: pointer; text-decoration: none; transition: all 0.12s;
    }
    .c-btn:hover { border-color: var(--border); color: var(--text); background: var(--bg-tertiary); }
    .c-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .c-btn.primary:hover { opacity: 0.88; }

    /* Loading */
    .loading-row { display: none; align-items: center; justify-content: center; gap: 5px; padding: 32px; }
    .loading-row.on { display: flex; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); animation: dp 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dp { 0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);} }

    .state-msg { padding: 40px 20px; text-align: center; }
    .state-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: var(--text-2); }
    .state-sub { font-size: 11px; color: var(--text-3); line-height: 1.6; }
    .err-msg { padding: 20px; text-align: center; font-size: 12px; color: #c0392b; line-height: 1.7; }

    /* Map */
    .map-col { position: relative; background: var(--bg-secondary); overflow: hidden; }
    #mapEl { position: absolute; inset: 0; }
    .map-ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; pointer-events: none; transition: opacity 0.3s;
    }
    .map-ph.gone { opacity: 0; }
    .map-ph-ring { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .map-ph-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }

    /* Leaflet */
    .leaflet-container { background: var(--bg-secondary) !important; font-family: 'DM Sans', sans-serif !important; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important; }
    .leaflet-control-zoom a { background: var(--bg) !important; color: var(--text-2) !important; border-color: var(--border-light) !important; width: 28px !important; height: 28px !important; line-height: 28px !important; }
    .leaflet-control-zoom a:hover { background: var(--bg-secondary) !important; color: var(--text) !important; }
    .leaflet-control-attribution { display: none !important; }

    /* Custom pin */
    .map-pin-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .map-pin-bubble {
      padding: 5px 11px; border-radius: 100px;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      white-space: nowrap; cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      border: 2px solid transparent;
    }
    .map-pin-stem {
      width: 2px; height: 7px;
    }
    .map-pin-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div class="nav-logo">Finding</div>
    <div class="nav-tag" id="navTag">Live Demo</div>
  </div>

  <div class="main">
    <div class="panel">
      <div class="panel-inner">

        <div class="field-label" data-i18n="search">Search</div>
        <div class="search-wrap">
          <span class="s-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <input class="search-input" id="queryInput" type="text" placeholder="cafe near Taipei 101" value="cafe near Taipei 101" />
        </div>

        <div class="vibe-section">
          <div class="field-label" data-i18n="vibe">Vibe</div>
          <div class="vibe-list" id="vibeList">
            <div class="vibe-item active" data-vibe="study"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_study">Study</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
            <div class="vibe-item" data-vibe="date"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_date">Date</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
            <div class="vibe-item" data-vibe="quiet_relax"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_quiet">Quiet &amp; Relax</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
            <div class="vibe-item" data-vibe="work_meeting"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_work">Work &amp; Meeting</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
            <div class="vibe-item" data-vibe="aesthetic_photo"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_aesthetic">Aesthetic</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
            <div class="vibe-item" data-vibe="late_night"><div class="vibe-left"><div class="vibe-dot"></div><span class="vibe-label" data-i18n="vibe_late">Late Night</span></div><div class="vibe-check"><div class="vibe-check-inner"></div></div></div>
          </div>
        </div>

        <div class="rule"></div>

        <div class="field-label" data-i18n="language">Language</div>
        <div class="lang-row">
          <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
          <button class="lang-btn" onclick="setLang('zh-TW',this)">中文</button>
        </div>

        <button class="find-btn" id="findBtn" onclick="runSearch()">
          <span data-i18n="find_btn">Find places</span>
        </button>

      </div>
    </div>

    <div class="content">
      <div class="results-col">
        <div class="results-header">
          <span class="r-title" id="rTitle" data-i18n="results">Results</span>
          <span class="r-count" id="rCount"></span>
        </div>
        <div class="loading-row" id="loadingRow"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="results-list" id="rList">
          <div class="state-msg">
            <div class="state-title" data-i18n="pick_vibe">Pick a vibe</div>
            <div class="state-sub" data-i18n="pick_vibe_sub">Finding matches places to how you feel.</div>
          </div>
        </div>
      </div>

      <div class="map-col">
        <div id="mapEl"></div>
        <div class="map-ph" id="mapPH">
          <div class="map-ph-ring">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="12" cy="11" r="3"/><path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
          </div>
          <div class="map-ph-label" data-i18n="map_placeholder">Map will appear here</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://vibemap-backend-828301275847.asia-east1.run.app';
let selectedVibe = 'study';
let selectedLang = 'en';
let map = null;
let markerData = [];

// i18n strings
const i18n = {
  en: {
    search: 'Search', vibe: 'Vibe', language: 'Language',
    vibe_study: 'Study', vibe_date: 'Date', vibe_quiet: 'Quiet & Relax',
    vibe_work: 'Work & Meeting', vibe_aesthetic: 'Aesthetic', vibe_late: 'Late Night',
    find_btn: 'Find places', results: 'Results', pick_vibe: 'Pick a vibe',
    pick_vibe_sub: 'Finding matches places to how you feel.',
    map_placeholder: 'Map will appear here', searching: 'Searching...',
    no_results: 'No results', no_results_sub: 'Try a different query or vibe.',
    open_maps: 'Open in Maps', website: 'Website',
    why: 'Why this place', evidence: 'From reviews', address: 'Address',
    rating: 'Rating', reviews: 'reviews',
  },
  'zh-TW': {
    search: '搜尋', vibe: '氛圍', language: '語言',
    vibe_study: '讀書', vibe_date: '約會', vibe_quiet: '放鬆',
    vibe_work: '工作會議', vibe_aesthetic: '好拍照', vibe_late: '深夜',
    find_btn: '開始搜尋', results: '結果', pick_vibe: '選擇氛圍',
    pick_vibe_sub: '根據你的心情，找到最適合的地方。',
    map_placeholder: '地圖將顯示於此', searching: '搜尋中...',
    no_results: '無結果', no_results_sub: '請嘗試不同的關鍵字或氛圍。',
    open_maps: '在 Google Maps 開啟', website: '官方網站',
    why: '為何推薦', evidence: '評論摘錄', address: '地址',
    rating: '評分', reviews: '則評論',
  }
};

function t(key) { return i18n[selectedLang][key] || i18n.en[key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.getElementById('queryInput').placeholder = selectedLang === 'zh-TW' ? '台北101 附近咖啡廳' : 'cafe near Taipei 101';
}

function setLang(lang, btn) {
  selectedLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyI18n();
}

// Vibe selection
document.querySelectorAll('.vibe-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.vibe-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    selectedVibe = item.dataset.vibe;
  });
});

// Map pin icon
function makeIcon(num, name, isActive) {
  const html = `<div class="map-pin-wrap">
    <div class="map-pin-bubble" style="
      background:${isActive ? '#0071E3' : '#FFFFFF'};
      color:${isActive ? '#FFFFFF' : '#1D1D1F'};
      border-color:${isActive ? '#0071E3' : '#D2D2D7'};
      box-shadow:${isActive ? '0 4px 16px rgba(0,113,227,0.4)' : '0 2px 10px rgba(0,0,0,0.15)'};
    ">
      <span style="opacity:0.6;font-size:9px;margin-right:3px;">${String(num).padStart(2,'0')}</span>${name}
    </div>
    <div class="map-pin-stem" style="background:${isActive ? '#0071E3' : '#AEAEB2'};"></div>
    <div class="map-pin-dot" style="background:${isActive ? '#0071E3' : '#AEAEB2'};"></div>
  </div>`;
  return L.divIcon({ html, className: '', iconAnchor: [50, 40] });
}

function initMap(lat, lng) {
  if (map) { map.remove(); map = null; }
  markerData = [];
  document.getElementById('mapPH').classList.add('gone');
  map = L.map('mapEl', { zoomControl: true, attributionControl: false }).setView([lat, lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function updateMarkers(activeIdx) {
  markerData.forEach((d, j) => {
    if (!d) return;
    d.marker.setIcon(makeIcon(j + 1, d.shortName, j === activeIdx));
  });
}

async function runSearch() {
  const q = document.getElementById('queryInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('findBtn');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t('searching');

  document.getElementById('loadingRow').classList.add('on');
  document.getElementById('rList').innerHTML = '';
  document.getElementById('rTitle').textContent = t('searching');
  document.getElementById('rCount').textContent = '';
  if (map) { map.remove(); map = null; document.getElementById('mapPH').classList.remove('gone'); }

  try {
    const url = `${API}/search?q=${encodeURIComponent(q)}&vibe=${selectedVibe}&lang=${selectedLang}&page_size=15&top_n=5`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    const results = data.results || [];

    document.getElementById('loadingRow').classList.remove('on');
    btn.disabled = false;
    btn.querySelector('[data-i18n]').textContent = t('find_btn');

    const vibeName = t('vibe_' + selectedVibe.split('_')[0]) || selectedVibe;
    document.getElementById('rTitle').textContent = vibeName;
    document.getElementById('rCount').textContent = results.length ? `${results.length} ${t('results').toLowerCase()}` : '';

    if (!results.length) {
      document.getElementById('rList').innerHTML = `<div class="state-msg"><div class="state-title">${t('no_results')}</div><div class="state-sub">${t('no_results_sub')}</div></div>`;
      return;
    }

    if (results[0].lat && results[0].lng) initMap(results[0].lat, results[0].lng);

    const list = document.getElementById('rList');
    results.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'place-card' + (i === 0 ? ' active open' : '');
      card.style.animationDelay = (i * 60) + 'ms';

      const tags = (p.pos_hits || []).slice(0, 4).map(t2 => `<span class="c-tag">${t2}</span>`).join('');
      const evidenceHtml = (p.evidence_pos || []).length
        ? `<div class="evidence-block">
            <div class="evidence-label">${t('evidence')}</div>
            ${(p.evidence_pos || []).map(e => `<div class="evidence-item">"${e}"</div>`).join('')}
          </div>` : '';

      card.innerHTML = `
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-num">${String(i+1).padStart(2,'0')}</div>
            <div class="card-name">${p.name}</div>
          </div>
          <div class="card-header-right">
            <div class="card-rating">
              <span class="star">★</span>
              <span class="r-num">${p.rating ?? '—'}</span>
              <span class="r-ct">(${(p.userRatingCount||0).toLocaleString()})</span>
            </div>
            <div class="card-chevron">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-body-inner">
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
            ${p.why ? `<div class="card-why">${p.why}</div>` : ''}
            ${p.address ? `<div class="detail-row"><span class="detail-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span class="detail-text">${p.address}</span></div>` : ''}
            ${evidenceHtml}
            <div class="card-btns">
              <a class="c-btn primary" href="${p.googleMaps}" target="_blank">${t('open_maps')}</a>
              ${p.website ? `<a class="c-btn" href="${p.website}" target="_blank">${t('website')}</a>` : ''}
            </div>
          </div>
        </div>`;

      // Toggle accordion
      card.querySelector('.card-header').addEventListener('click', () => {
        const isOpen = card.classList.contains('open');
        // Close all
        document.querySelectorAll('.place-card.open').forEach(c => c.classList.remove('open'));
        // Set active
        document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        if (!isOpen) card.classList.add('open');
        // Map
        updateMarkers(i);
        if (p.lat && p.lng && map) map.panTo([p.lat, p.lng]);
      });

      list.appendChild(card);

      // Map marker
      if (p.lat && p.lng && map) {
        const shortName = p.name.split(' ').slice(0, 2).join(' ');
        const marker = L.marker([p.lat, p.lng], { icon: makeIcon(i + 1, shortName, i === 0) }).addTo(map);
        marker.on('click', () => {
          document.querySelectorAll('.place-card').forEach(c => { c.classList.remove('active'); c.classList.remove('open'); });
          card.classList.add('active', 'open');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          updateMarkers(i);
        });
        markerData.push({ marker, shortName });
      } else {
        markerData.push(null);
      }
    });

  } catch (err) {
    document.getElementById('loadingRow').classList.remove('on');
    btn.disabled = false;
    btn.querySelector('[data-i18n]').textContent = t('find_btn');
    document.getElementById('rList').innerHTML = `<div class="err-msg">Could not connect.<br><span style="font-size:10px;color:#AEAEB2;">${err.message}</span></div>`;
  }
}
</script>
</body>
</html>
